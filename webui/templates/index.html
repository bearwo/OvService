<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OvService Chat</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="logo">
                <h2>OvService</h2>
                <p>OpenVINO AI Chat</p>
            </div>
            <div class="model-info">
                <select id="model-select">
                    <option value="chat">Qwen3.6-35B-A3B</option>
                </select>
                <button id="model-status" class="status-btn">Connected</button>
            </div>
            <div class="settings">
                <label>Temperature: <span id="temp-value">0.7</span></label>
                <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7">
                <label>Max Tokens: <span id="tokens-value">8192</span></label>
                <input type="range" id="max-tokens" min="256" max="32768" step="256" value="8192">
            </div>
            <div class="actions">
                <button id="new-chat" class="btn">New Chat</button>
                <button id="clear-chat" class="btn btn-danger">Clear</button>
            </div>
            <div class="history" id="chat-history"></div>
        </div>
        <div class="main">
            <div class="messages" id="messages">
                <div class="welcome">
                    <h1>OvService</h1>
                    <p>Powered by OpenVINO GenAI</p>
                    <p>Start chatting below</p>
                </div>
            </div>
            <div class="input-area">
                <div id="file-preview" class="file-preview" style="display:none">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    <span id="preview-name"></span>
                    <button id="remove-file" class="remove-btn">&times;</button>
                </div>
                <div class="input-row">
                    <div class="upload-btn" id="upload-btn" title="Upload image or document">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
                        <input type="file" id="file-input" accept="image/*,.pdf,.txt,.md" hidden>
                    </div>
                    <textarea id="user-input" placeholder="Type your message..." rows="1"></textarea>
                    <button id="send-btn" class="send-btn">Send</button>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
